<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Dodger Shop</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin: 10px 0 0;
    }

    p {
      margin: 5px 0 10px;
    }

    #topBar {
      margin: 10px auto;
      width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    #stats {
      text-align: left;
      font-size: 18px;
    }

    #shop {
      width: 500px;
      margin: 10px auto;
      background: #222;
      border: 2px solid white;
      padding: 10px;
      box-sizing: border-box;
    }

    #shop h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
    }

    .skin-btn {
      margin: 4px;
      padding: 8px 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    canvas {
      background: #222;
      display: block;
      margin: 0 auto;
      border: 2px solid white;
    }

    #message {
      margin-top: 8px;
      min-height: 24px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Block Dodger</h1>
  <p>Move with Left and Right arrow keys</p>

  <div id="topBar">
    <div id="stats">
      <div>Score: <span id="scoreText">0</span></div>
      <div>Coins: <span id="coinsText">0</span></div>
      <div>Skin: <span id="skinText">white</span></div>
    </div>
  </div>

  <div id="shop">
    <h2>Skin Shop (100 coins each)</h2>
    <button class="skin-btn" onclick="buyOrUseSkin('red')" style="background:red;color:white;">Red</button>
    <button class="skin-btn" onclick="buyOrUseSkin('orange')" style="background:orange;color:black;">Orange</button>
    <button class="skin-btn" onclick="buyOrUseSkin('yellow')" style="background:yellow;color:black;">Yellow</button>
    <button class="skin-btn" onclick="buyOrUseSkin('green')" style="background:green;color:white;">Green</button>
    <button class="skin-btn" onclick="buyOrUseSkin('blue')" style="background:blue;color:white;">Blue</button>
    <button class="skin-btn" onclick="buyOrUseSkin('purple')" style="background:purple;color:white;">Purple</button>
    <div id="message"></div>
  </div>

  <canvas id="gameCanvas" width="500" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreText = document.getElementById("scoreText");
    const coinsText = document.getElementById("coinsText");
    const skinText = document.getElementById("skinText");
    const messageText = document.getElementById("message");

    let coins = 0;
    let score = 0;
    let gameOver = false;
    let frameCount = 0;

    let ownedSkins = {
      white: true,
      red: false,
      orange: false,
      yellow: false,
      green: false,
      blue: false,
      purple: false
    };

    let currentSkin = "white";

    const player = {
      x: 220,
      y: 550,
      width: 60,
      height: 20,
      speed: 7
    };

    const keys = {
      left: false,
      right: false
    };

    let obstacles = [];

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") keys.left = true;
      if (e.key === "ArrowRight") keys.right = true;

      if ((e.key === "r" || e.key === "R") && gameOver) {
        restartGame();
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
    });

    function updateUI() {
      scoreText.textContent = score;
      coinsText.textContent = coins;
      skinText.textContent = currentSkin;
    }

    function showMessage(text) {
      messageText.textContent = text;
    }

    function buyOrUseSkin(color) {
      if (ownedSkins[color]) {
        currentSkin = color;
        showMessage("Using " + color + " skin");
      } else {
        if (coins >= 100) {
          coins -= 100;
          ownedSkins[color] = true;
          currentSkin = color;
          showMessage("Bought " + color + " skin");
        } else {
          showMessage("Not enough coins for " + color);
        }
      }
      updateUI();
    }

    function restartGame() {
      obstacles = [];
      score = 0;
      frameCount = 0;
      gameOver = false;
      player.x = 220;
      showMessage("");
      updateUI();
      gameLoop();
    }

    function createObstacle() {
      const width = Math.random() * 60 + 20;
      const x = Math.random() * (canvas.width - width);

      obstacles.push({
        x: x,
        y: -20,
        width: width,
        height: 20,
        speed: Math.random() * 3 + 3,
        color: "tomato"
      });
    }

    function endGame() {
      gameOver = true;
      coins += score;
      updateUI();
      showMessage("You earned " + score + " coins this round");
    }

    function update() {
      if (gameOver) return;

      frameCount++;

      if (keys.left && player.x > 0) {
        player.x -= player.speed;
      }

      if (keys.right && player.x + player.width < canvas.width) {
        player.x += player.speed;
      }

      if (frameCount % 30 === 0) {
        createObstacle();
      }

      for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].y += obstacles[i].speed;

        if (
          player.x < obstacles[i].x + obstacles[i].width &&
          player.x + player.width > obstacles[i].x &&
          player.y < obstacles[i].y + obstacles[i].height &&
          player.y + player.height > obstacles[i].y
        ) {
          endGame();
          return;
        }

        if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
          score++;
          i--;
        }
      }

      updateUI();
    }

    function drawPlayer() {
      ctx.fillStyle = currentSkin;
      ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function drawObstacles() {
      for (let obstacle of obstacles) {
        ctx.fillStyle = obstacle.color;
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
      }
    }

    function drawScore() {
      ctx.fillStyle = "white";
      ctx.font = "24px Arial";
      ctx.fillText("Score: " + score, 20, 30);
      ctx.fillText("Coins: " + coins, 20, 60);
    }

    function drawGameOver() {
      ctx.fillStyle = "white";
      ctx.font = "40px Arial";
      ctx.fillText("Game Over", 145, 250);
      ctx.font = "24px Arial";
      ctx.fillText("Press R to Restart", 150, 300);
      ctx.fillText("Round Coins: " + score, 170, 340);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPlayer();
      drawObstacles();
      drawScore();

      if (gameOver) {
        drawGameOver();
      }
    }

    function gameLoop() {
      update();
      draw();

      if (!gameOver) {
        requestAnimationFrame(gameLoop);
      }
    }

    updateUI();
    gameLoop();
  </script>
</body>
</html>
